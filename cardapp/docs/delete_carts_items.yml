summary: Xóa một sản phẩm khỏi giỏ hàng
description: Xóa sản phẩm dựa theo ID. Trả về thống kê giỏ hàng mới nhất sau khi xóa.
produces:
  - application/json
parameters:
  - in: path
    name: product_id
    required: true
    type: string
    description: ID của sản phẩm cần xóa khỏi giỏ
responses:
  204:
    description: Xóa thành công (Mã 204 No Content thường không kèm body).